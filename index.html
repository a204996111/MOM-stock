<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股價手續費計算</title>
    <style>
        /* 樣式設定 - 大字體版 */
        body {
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 36px;
            margin-bottom: 25px;
            margin-top: 0;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left; /* 讓標籤靠左對齊比較整齊 */
            padding: 0 10px;
        }

        label {
            display: block;
            font-size: 26px;
            color: #555;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="number"] {
            width: 100%; /* 寬度填滿 */
            padding: 15px;
            font-size: 32px;
            border: 3px solid #ddd;
            border-radius: 12px;
            text-align: center;
            outline: none;
            box-sizing: border-box; /* 確保padding不會撐大寬度 */
        }

        input[type="number"]:focus {
            border-color: #3498db;
        }

        /* 賣出價格欄位稍微做個區隔顏色，讓長輩好分辨 */
        #sellPrice {
            background-color: #fdfefe;
            border-color: #bdc3c7;
        }
        #sellPrice:focus {
            border-color: #27ae60;
        }

        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px;
            font-size: 32px;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 5px 0 #c0392b;
            font-weight: bold;
        }

        button:active {
            box-shadow: none;
            transform: translateY(5px);
        }

        .result-box {
            margin-top: 30px;
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 15px;
            display: none;
        }

        .result-item {
            font-size: 26px;
            margin: 12px 0;
            color: #333;
            border-bottom: 2px dashed #bdc3c7;
            padding-bottom: 8px;
        }

        .highlight {
            color: #2c3e50;
            font-weight: bold;
            font-size: 36px;
            display: block;
            margin-top: 5px;
        }

        /* 損益平衡區塊 */
        .breakeven-box {
            background-color: #ffeaa7; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 15px;
        }
        
        /* 淨利區塊 */
        .profit-box {
            background-color: #dfe6e9; /* 預設灰色 */
            padding: 15px; 
            border-radius: 12px;
            margin-top: 15px;
            border: 3px solid transparent;
        }

        .note {
            margin-top: 20px;
            font-size: 16px;
            color: #95a5a6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>💰 股價手續費計算</h1>
        
        <div class="input-group">
            <label for="buyPrice">1. 買進價格 (元)</label>
            <input type="number" id="buyPrice" placeholder="輸入買價" inputmode="decimal">
        </div>

        <div class="input-group">
            <label for="sellPrice">2. 預計賣出 (可不填)</label>
            <input type="number" id="sellPrice" placeholder="輸入賣價" inputmode="decimal">
        </div>

        <button onclick="calculate()">開始計算</button>

        <div id="result" class="result-box">
            
            <div class="breakeven-box">
                損益平衡價 (不賠錢): <br>
                <span id="breakEven" class="highlight" style="color: #d63031;">0</span>
            </div>

            <div class="result-item">
                買進總成本 (含手續費): <br>
                <span id="totalBuyCost" class="highlight">0</span>
            </div>

            <div id="profitSection" class="profit-box" style="display:none;">
                預估淨賺/賠: <br>
                <span id="netProfit" class="highlight">0</span>
            </div>

        </div>
        
        <p class="note">
            *手續費 0.1425%，證交稅 0.3%<br>
            *紅色代表賺錢，綠色代表賠錢
        </p>
    </div>

    <script>
        function calculate() {
            // 1. 取得輸入
            var buyInput = document.getElementById('buyPrice').value;
            var sellInput = document.getElementById('sellPrice').value;
            
            if (buyInput === "") {
                alert("媽媽，請先輸入「買進價格」喔！");
                return;
            }

            var buyPrice = parseFloat(buyInput);
            var sellPrice = parseFloat(sellInput); // 如果沒填，這裡是 NaN

            // 2. 參數設定
            var feeRate = 0.001425; 
            var taxRate = 0.003;

            // 3. 計算買進成本
            var stockValue = buyPrice * 1000;
            var buyFee = Math.round(stockValue * feeRate);
            var totalBuyCost = stockValue + buyFee; // 這是買股票總共要付的錢

            // 4. 計算損益平衡價
            // 公式：(股價*1000 + 買入手續費) / (1000 * (1 - 0.001425 - 0.003))
            // 這裡假設賣出時股價如果等於平衡價，手續費和稅金也會隨之變動
            // 為了精確，我們用除法反推
            var breakEvenPrice = (stockValue + buyFee) / (1000 * (1 - feeRate - taxRate));

            // 5. 更新介面 (基本資訊)
            document.getElementById('totalBuyCost').innerText = totalBuyCost.toLocaleString() + " 元";
            document.getElementById('breakEven').innerText = breakEvenPrice.toFixed(2) + " 元";
            
            // 6. 計算獲利 (如果有輸入賣出價)
            var profitSection = document.getElementById('profitSection');
            
            if (!isNaN(sellPrice)) {
                // 有輸入賣價，開始算賺賠
                var sellStockValue = sellPrice * 1000;
                var sellFee = Math.round(sellStockValue * feeRate);
                var sellTax = Math.round(sellStockValue * taxRate);
                
                // 賣出拿回來的錢 (扣掉賣出手續費和稅)
                var sellNetIncome = sellStockValue - sellFee - sellTax;

                // 淨利 = 賣出拿回 - 買進付出
                var netProfit = sellNetIncome - totalBuyCost;

                var profitSpan = document.getElementById('netProfit');
                profitSpan.innerText = netProfit.toLocaleString() + " 元";

                // 根據賺賠改變顏色 (台股：紅漲綠跌)
                if (netProfit > 0) {
                    profitSpan.style.color = "#e1251b"; // 紅色 (賺)
                    profitSection.style.backgroundColor = "#ff7675"; // 背景淡紅
                    profitSection.style.color = "white"; // 字變白比較明顯
                    profitSpan.style.color = "white";
                } else if (netProfit < 0) {
                    profitSpan.style.color = "#009432"; // 綠色 (賠)
                    profitSection.style.backgroundColor = "#55efc4"; // 背景淡綠
                    profitSection.style.color = "#2d3436";
                } else {
                    profitSpan.style.color = "#333"; // 持平
                    profitSection.style.backgroundColor = "#dfe6e9";
                    profitSection.style.color = "#333";
                }

                profitSection.style.display = "block";
            } else {
                // 沒輸入賣價，隱藏獲利區塊
                profitSection.style.display = "none";
            }

            // 顯示結果區
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
