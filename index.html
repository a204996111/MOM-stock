<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>股價計算機</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="股價計算">
    <meta name="theme-color" content="#f4f7f6">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2454/2454282.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2454/2454282.png">

    <style>
        /* 基礎樣式設定 */
        body {
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh;   
            margin: 0;
            padding: 20px;
            overscroll-behavior-y: none;
            -webkit-user-select: none; 
            user-select: none;
        }

        .container {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
            margin-top: 20px; 
            margin-bottom: 40px; 
        }

        h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 20px;
            margin-top: 0;
            white-space: nowrap;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
            padding: 0 5px;
        }

        label {
            display: block;
            font-size: 24px;
            color: #555;
            margin-bottom: 8px;
            font-weight: bold;
        }

        /* 輸入框樣式 */
        input.main-input {
            width: 100%;
            padding: 15px;
            font-size: 32px;
            border: 3px solid #3498db; 
            border-radius: 12px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            background-color: #fff;
            -webkit-user-select: text;
            user-select: text;
        }

        .secondary-group {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 10px;
            margin-bottom: 25px;
            padding: 0 5px;
        }

        input.sub-input {
            width: 100%;
            padding: 10px;
            font-size: 22px; 
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            background-color: #fafafa;
            -webkit-user-select: text;
            user-select: text;
        }

        input.sub-input:focus, input.main-input:focus {
            border-color: #3498db;
            background-color: #fff;
        }

        #sellPrice {
            background-color: #fdfefe;
            border-color: #bdc3c7;
        }
        #sellPrice:focus {
            border-color: #e74c3c;
            box-shadow: 0 0 8px rgba(231, 76, 60, 0.3);
        }

        /* 進階設定區塊 */
        .adv-panel {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        .adv-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 20px;
            color: #495057;
            font-weight: bold;
        }

        .adv-row:last-child {
            margin-bottom: 0;
        }

        select.adv-select, input.adv-select {
            padding: 8px;
            font-size: 18px;
            border-radius: 8px;
            border: 1px solid #ced4da;
            background-color: white;
            color: #2c3e50;
            outline: none;
        }

        input.adv-select:focus {
            border-color: #3498db;
        }

        /* iPhone 風格滑動開關 */
        .switch {
            position: relative;
            display: inline-block;
            width: 54px;
            height: 30px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 30px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #e74c3c; 
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button.calc-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px;
            font-size: 30px;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
            box-shadow: 0 5px 0 #c0392b;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }

        button.calc-btn:active {
            box-shadow: none;
            transform: translateY(5px);
        }

        /* 結果顯示區塊 */
        .result-box {
            margin-top: 25px;
            display: none;
        }

        .highlight {
            font-weight: bold;
            font-size: 40px;
            display: block;
            margin-top: 5px;
        }

        .breakeven-box {
            background-color: #ffeaa7; 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 15px;
            color: #333;
            font-size: 24px;
        }

        .margin-box {
            background-color: #e3f2fd; 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 15px;
            color: #1565c0;
            font-size: 22px;
            display: none; 
        }
        
        .avg-price-row {
            font-size: 20px;
            color: #2c3e50;
            background-color: #f0f3f5;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .fee-row {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .fee-item {
            flex: 1;
            font-size: 18px;
            color: #636e72;
            position: relative;
        }

        .fee-number {
            display: block;
            font-size: 26px;
            color: #2d3436;
            font-weight: bold;
            margin-top: 5px;
        }

        .divider {
            font-size: 30px;
            color: #b2bec3;
            margin: 0 10px;
            font-weight: 100;
            display: none;
        }

        .profit-box {
            background-color: #dfe6e9;
            padding: 20px; 
            border-radius: 15px;
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>💰 股價手續費計算</h1>
        
        <div class="input-group">
            <label>1. 買進價格 (元)</label>
            <input type="number" id="buyPrice1" class="main-input calc-trigger" placeholder="主要價格" inputmode="decimal">
        </div>
        
        <div class="secondary-group">
            <input type="number" id="buyPrice2" class="sub-input calc-trigger" placeholder="價格1" inputmode="decimal">
            <input type="number" id="buyPrice3" class="sub-input calc-trigger" placeholder="價格2" inputmode="decimal">
            <input type="number" id="buyPrice4" class="sub-input calc-trigger" placeholder="價格3" inputmode="decimal">
            <input type="number" id="buyPrice5" class="sub-input calc-trigger" placeholder="價格4" inputmode="decimal">
            <input type="number" id="buyPrice6" class="sub-input calc-trigger" placeholder="價格5" inputmode="decimal">
            <input type="number" id="buyPrice7" class="sub-input calc-trigger" placeholder="價格6" inputmode="decimal">
        </div>

        <div class="input-group">
            <label for="sellPrice">2. 預計賣出 (可不填)</label>
            <input type="number" id="sellPrice" class="main-input calc-trigger" style="border-color: #bdc3c7;" placeholder="輸入賣價" inputmode="decimal">
        </div>

        <div class="adv-panel">
            <div class="adv-row" style="flex-wrap: wrap;">
                <span>券商手續費</span>
                <div style="display:flex; gap:10px; align-items: center;">
                    <select id="discountSelect" class="adv-select" onchange="toggleCustomDiscount()">
                        <option value="1">不打折</option>
                        <option value="0.65" selected>永豐一般 (65折)</option>
                        <option value="0.5">優惠 (5折)</option>
                        <option value="0.28">專屬大戶 (28折)</option>
                        <option value="custom">自訂折數</option>
                    </select>
                    <input type="number" id="customDiscount" class="adv-select calc-trigger" style="width: 80px; display: none;" placeholder="例:0.35" step="0.01" inputmode="decimal">
                </div>
            </div>

            <div class="adv-row">
                <span>現股當沖 (稅減半)</span>
                <div class="toggle-group">
                    <label class="switch">
                        <input type="checkbox" id="dayTradeToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="adv-row">
                <span>融資計算</span>
                <div class="toggle-group">
                    <label class="switch">
                        <input type="checkbox" id="marginToggle" onchange="toggleMarginOptions()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div id="marginDetails" style="display: none; background-color: #f1f3f5; padding: 12px; border-radius: 10px; margin-top: 10px; font-size: 16px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center;">
                    <span style="color:#555; font-weight: bold;">融資成數:</span>
                    <select id="marginRatio" class="adv-select" style="font-size: 15px; padding: 5px;">
                        <option value="0.6">融資 6 成</option>
                        <option value="0.5">融資 5 成</option>
                    </select>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center;">
                    <span style="color:#555; font-weight: bold;">融資利率 (%):</span>
                    <input type="number" id="marginRate" class="adv-select calc-trigger" style="font-size: 15px; padding: 5px; width: 80px; text-align: center;" value="6.35" step="0.01" inputmode="decimal">
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color:#555; font-weight: bold;">持有天數 (天):</span>
                    <input type="number" id="holdingDays" class="adv-select calc-trigger" style="font-size: 15px; padding: 5px; width: 80px; text-align: center;" placeholder="自填" inputmode="numeric">
                </div>
            </div>
        </div>

        <button class="calc-btn" onclick="calculate()">開始計算</button>

        <div id="result" class="result-box">
            
            <div class="breakeven-box">
                損益平衡價 (不賠錢): <br>
                <span id="breakEven" class="highlight" style="color: #d63031;">0</span>
            </div>

            <div class="margin-box" id="marginResultBox">
                預估自備款 (含手續費): <br>
                <span id="marginDownPayment" class="highlight" style="color: #1976d2;">0</span>
            </div>

            <div class="avg-price-row">
                平均股價: <b id="avgPriceDisplay">0</b> 元 
                <span style="font-size: 16px; color:#7f8c8d;">(共 <span id="totalCount">0</span> 張)</span>
            </div>

            <div class="fee-row">
                <div class="fee-item">
                    買進成本:<br>
                    <span id="buyFeeDisplay" class="fee-number">0</span>
                </div>

                <div class="divider" id="feeDivider">|</div>

                <div class="fee-item" id="sellFeeBlock" style="display:none;">
                    賣出成本:<br>
                    <span id="sellFeeDisplay" class="fee-number">0</span>
                    <div id="interestDisplay" style="font-size: 14px; color: #d63031; margin-top: 5px; display: none;">(含利息: 0)</div>
                </div>
            </div>

            <div id="profitSection" class="profit-box" style="display:none;">
                預估總淨賺/賠: <br>
                <span id="netProfit" class="highlight">0</span>
            </div>

        </div>
    </div>

    <script>
        // --- 新增：Enter 秒算功能 ---
        document.addEventListener('DOMContentLoaded', function() {
            var triggers = document.querySelectorAll('.calc-trigger');
            triggers.forEach(function(input) {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        input.blur(); // 收起手機小鍵盤
                        calculate();
                    }
                });
            });
        });

        // 控制自訂折數輸入框
        function toggleCustomDiscount() {
            var val = document.getElementById('discountSelect').value;
            var customInput = document.getElementById('customDiscount');
            if (val === 'custom') {
                customInput.style.display = "block";
                customInput.focus();
            } else {
                customInput.style.display = "none";
            }
        }

        // 控制融資選項展開
        function toggleMarginOptions() {
            var isChecked = document.getElementById('marginToggle').checked;
            var marginDetails = document.getElementById('marginDetails');
            if (isChecked) {
                marginDetails.style.display = "block";
            } else {
                marginDetails.style.display = "none";
            }
        }

        function calculate() {
            var prices = [];
            for (var i = 1; i <= 7; i++) {
                var val = document.getElementById('buyPrice' + i).value;
                if (val !== "") {
                    prices.push(parseFloat(val));
                }
            }

            if (prices.length === 0) {
                return; 
            }

            var sellInput = document.getElementById('sellPrice').value;
            var sellPrice = parseFloat(sellInput);

            // 讀取折數
            var discountVal = document.getElementById('discountSelect').value;
            var discount = 1;
            if (discountVal === 'custom') {
                var customVal = document.getElementById('customDiscount').value;
                discount = customVal !== "" ? parseFloat(customVal) : 1;
            } else {
                discount = parseFloat(discountVal);
            }

            var isDayTrade = document.getElementById('dayTradeToggle').checked;
            var isMargin = document.getElementById('marginToggle').checked;
            var marginRatio = parseFloat(document.getElementById('marginRatio').value);

            var baseFeeRate = 0.001425;
            var feeRate = baseFeeRate * discount; 
            var taxRate = isDayTrade ? 0.0015 : 0.003; 

            var totalStockValue = 0; 
            var totalBuyFee = 0;     
            var totalShares = 0;     
            var totalLoanAmount = 0; // 總融資借款

            for (var i = 0; i < prices.length; i++) {
                var p = prices[i];
                var shareValue = p * 1000; 
                var fee = Math.round(shareValue * feeRate);
                
                totalStockValue += shareValue;
                totalBuyFee += fee;
                totalShares += 1000;

                // 若有融資：單筆融資金額以千為單位 (無條件捨去畸零款)
                if (isMargin) {
                    var loan = Math.floor((shareValue * marginRatio) / 1000) * 1000;
                    totalLoanAmount += loan;
                }
            }

            var totalBuyCost = totalStockValue + totalBuyFee; 
            var avgPrice = totalStockValue / totalShares; 

            var breakEvenPrice = totalBuyCost / (totalShares * (1 - feeRate - taxRate));

            document.getElementById('breakEven').innerText = breakEvenPrice.toFixed(2) + " 元";
            document.getElementById('buyFeeDisplay').innerText = totalBuyFee.toLocaleString();
            document.getElementById('avgPriceDisplay').innerText = avgPrice.toFixed(2);
            document.getElementById('totalCount').innerText = prices.length;

            // 處理融資自備款
            var marginResultBox = document.getElementById('marginResultBox');
            if (isMargin) {
                // 自備款 = (總股款 - 總融資借款) + 買進手續費
                var downPayment = (totalStockValue - totalLoanAmount) + totalBuyFee;
                document.getElementById('marginDownPayment').innerText = downPayment.toLocaleString() + " 元";
                marginResultBox.style.display = "block";
            } else {
                marginResultBox.style.display = "none";
            }

            // 處理賣出與淨利
            var feeDivider = document.getElementById('feeDivider');
            var sellFeeBlock = document.getElementById('sellFeeBlock');
            var profitSection = document.getElementById('profitSection');
            var interestDisplay = document.getElementById('interestDisplay');
            
            if (!isNaN(sellPrice)) {
                var sellTotalValue = sellPrice * totalShares; 
                var sellFee = Math.round(sellTotalValue * feeRate);
                var sellTax = Math.round(sellTotalValue * taxRate);
                
                // 計算融資利息
                var marginInterest = 0;
                if (isMargin) {
                    var marginRate = parseFloat(document.getElementById('marginRate').value) / 100;
                    var holdingDaysInput = document.getElementById('holdingDays').value;
                    var holdingDays = holdingDaysInput !== "" ? parseInt(holdingDaysInput) : 0;
                    
                    if (holdingDays > 0) {
                        marginInterest = Math.round(totalLoanAmount * marginRate * (holdingDays / 365));
                    }
                }

                var sellCostOnly = sellFee + sellTax + marginInterest; 

                document.getElementById('sellFeeDisplay').innerText = sellCostOnly.toLocaleString();
                
                // 顯示利息小字
                if (isMargin && marginInterest > 0) {
                    interestDisplay.innerText = "(含利息: " + marginInterest.toLocaleString() + ")";
                    interestDisplay.style.display = "block";
                } else {
                    interestDisplay.style.display = "none";
                }

                feeDivider.style.display = "block";
                sellFeeBlock.style.display = "block";

                // 計算總淨利
                var sellNetIncome = sellTotalValue - sellCostOnly;
                var netProfit = sellNetIncome - totalBuyCost;

                var profitSpan = document.getElementById('netProfit');
                profitSpan.innerText = netProfit.toLocaleString() + " 元";

                if (netProfit > 0) {
                    profitSpan.style.color = "#e1251b";
                    profitSection.style.backgroundColor = "#ff7675";
                    profitSection.style.color = "white"; 
                    profitSpan.style.color = "white";
                } else if (netProfit < 0) {
                    profitSpan.style.color = "#009432"; 
                    profitSection.style.backgroundColor = "#55efc4";
                    profitSection.style.color = "#2d3436";
                } else {
                    profitSpan.style.color = "#333";
                    profitSection.style.backgroundColor = "#dfe6e9";
                    profitSection.style.color = "#333";
                }

                profitSection.style.display = "block";
            } else {
                feeDivider.style.display = "none";
                sellFeeBlock.style.display = "none";
                profitSection.style.display = "none";
                interestDisplay.style.display = "none";
            }

            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
