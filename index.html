<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>股價計算機</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="股價計算">
    
    <meta name="theme-color" content="#f4f7f6">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2454/2454282.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2454/2454282.png">

    <style>
        /* 樣式設定 */
        body {
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center; /* 垂直置中 */
            min-height: 100vh;   /* 確保高度至少是螢幕高 */
            margin: 0;
            padding: 20px;
            /* 防止手機下拉重整 (更像App) */
            overscroll-behavior-y: none;
            -webkit-user-select: none; /* 禁止長按選取文字 */
            user-select: none;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 36px;
            margin-bottom: 25px;
            margin-top: 0;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
            padding: 0 10px;
        }

        label {
            display: block;
            font-size: 26px;
            color: #555;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            font-size: 32px;
            border: 3px solid #ddd;
            border-radius: 12px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            background-color: #fff;
            /* 讓輸入框可以被選取輸入 */
            -webkit-user-select: text;
            user-select: text;
        }

        #buyPrice:focus {
            border-color: #3498db;
        }

        #sellPrice {
            background-color: #fdfefe;
            border-color: #bdc3c7;
        }
        #sellPrice:focus {
            border-color: #e74c3c;
            box-shadow: 0 0 8px rgba(231, 76, 60, 0.3);
        }

        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px;
            font-size: 32px;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 5px 0 #c0392b;
            font-weight: bold;
            /* 點擊時取消藍色框框 */
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            box-shadow: none;
            transform: translateY(5px);
        }

        .result-box {
            margin-top: 25px;
            display: none;
        }

        .highlight {
            font-weight: bold;
            font-size: 40px;
            display: block;
            margin-top: 5px;
        }

        .breakeven-box {
            background-color: #ffeaa7; 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
        }
        
        .fee-row {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .fee-item {
            flex: 1;
            font-size: 20px;
            color: #636e72;
        }

        .fee-number {
            display: block;
            font-size: 28px;
            color: #2d3436;
            font-weight: bold;
            margin-top: 5px;
        }

        .divider {
            font-size: 40px;
            color: #b2bec3;
            margin: 0 15px;
            font-weight: 100;
            display: none;
        }

        .profit-box {
            background-color: #dfe6e9;
            padding: 20px; 
            border-radius: 15px;
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>💰 股價手續費計算</h1>
        
        <div class="input-group">
            <label for="buyPrice">1. 買進價格 (元)</label>
            <input type="number" id="buyPrice" placeholder="輸入買價" inputmode="decimal">
        </div>

        <div class="input-group">
            <label for="sellPrice">2. 預計賣出 (可不填)</label>
            <input type="number" id="sellPrice" placeholder="輸入賣價" inputmode="decimal">
        </div>

        <button onclick="calculate()">開始計算</button>

        <div id="result" class="result-box">
            
            <div class="breakeven-box">
                損益平衡價 (不賠錢): <br>
                <span id="breakEven" class="highlight" style="color: #d63031;">0</span>
            </div>

            <div class="fee-row">
                <div class="fee-item">
                    買進手續費:<br>
                    <span id="buyFeeDisplay" class="fee-number">0</span>
                </div>

                <div class="divider" id="feeDivider">|</div>

                <div class="fee-item" id="sellFeeBlock" style="display:none;">
                    賣出費用:<br>
                    <span id="sellFeeDisplay" class="fee-number">0</span>
                </div>
            </div>

            <div id="profitSection" class="profit-box" style="display:none;">
                預估淨賺/賠: <br>
                <span id="netProfit" class="highlight">0</span>
            </div>

        </div>
    </div>

    <script>
        function calculate() {
            var buyInput = document.getElementById('buyPrice').value;
            var sellInput = document.getElementById('sellPrice').value;
            
            if (buyInput === "") {
                return;
            }

            var buyPrice = parseFloat(buyInput);
            var sellPrice = parseFloat(sellInput);

            var feeRate = 0.001425; 
            var taxRate = 0.003;

            var stockValue = buyPrice * 1000;
            var buyFee = Math.round(stockValue * feeRate);
            var totalBuyCost = stockValue + buyFee; 

            var breakEvenPrice = (stockValue + buyFee) / (1000 * (1 - feeRate - taxRate));
            
            document.getElementById('breakEven').innerText = breakEvenPrice.toFixed(2) + " 元";
            document.getElementById('buyFeeDisplay').innerText = buyFee.toLocaleString();

            var feeDivider = document.getElementById('feeDivider');
            var sellFeeBlock = document.getElementById('sellFeeBlock');
            var profitSection = document.getElementById('profitSection');
            
            if (!isNaN(sellPrice)) {
                var sellStockValue = sellPrice * 1000;
                var sellFee = Math.round(sellStockValue * feeRate);
                var sellTax = Math.round(sellStockValue * taxRate);
                
                var sellCostOnly = sellFee + sellTax; 

                document.getElementById('sellFeeDisplay').innerText = sellCostOnly.toLocaleString();
                
                feeDivider.style.display = "block";
                sellFeeBlock.style.display = "block";

                var sellNetIncome = sellStockValue - sellCostOnly;
                var netProfit = sellNetIncome - totalBuyCost;

                var profitSpan = document.getElementById('netProfit');
                profitSpan.innerText = netProfit.toLocaleString() + " 元";

                if (netProfit > 0) {
                    profitSpan.style.color = "#e1251b";
                    profitSection.style.backgroundColor = "#ff7675";
                    profitSection.style.color = "white"; 
                    profitSpan.style.color = "white";
                } else if (netProfit < 0) {
                    profitSpan.style.color = "#009432"; 
                    profitSection.style.backgroundColor = "#55efc4";
                    profitSection.style.color = "#2d3436";
                } else {
                    profitSpan.style.color = "#333";
                    profitSection.style.backgroundColor = "#dfe6e9";
                    profitSection.style.color = "#333";
                }

                profitSection.style.display = "block";
            } else {
                feeDivider.style.display = "none";
                sellFeeBlock.style.display = "none";
                profitSection.style.display = "none";
            }

            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
