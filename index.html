<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股價手續費計算</title>
    <style>
        /* 樣式設定 */
        body {
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 36px;
            margin-bottom: 25px;
            margin-top: 0;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
            padding: 0 10px;
        }

        label {
            display: block;
            font-size: 26px;
            color: #555;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            font-size: 32px;
            border: 3px solid #ddd;
            border-radius: 12px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
        }

        /* 買進價格框聚焦時的顏色 (維持藍色) */
        #buyPrice:focus {
            border-color: #3498db;
        }

        /* --- 修改這裡：賣出價格框 --- */
        #sellPrice {
            background-color: #fdfefe;
            border-color: #bdc3c7;
        }
        /* 點擊輸入時變成喜氣的紅色！ */
        #sellPrice:focus {
            border-color: #e74c3c; /* 改成紅色了 */
            box-shadow: 0 0 8px rgba(231, 76, 60, 0.3); /* 加一點紅光暈 */
        }
        /* ------------------------ */

        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px;
            font-size: 32px;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 5px 0 #c0392b;
            font-weight: bold;
        }

        button:active {
            box-shadow: none;
            transform: translateY(5px);
        }

        .result-box {
            margin-top: 25px;
            display: none;
        }

        .highlight {
            font-weight: bold;
            font-size: 40px;
            display: block;
            margin-top: 5px;
        }

        /* 損益平衡區塊 */
        .breakeven-box {
            background-color: #ffeaa7; 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 0;
            color: #333;
            font-size: 24px;
        }
        
        /* 淨利區塊 */
        .profit-box {
            background-color: #dfe6e9;
            padding: 20px; 
            border-radius: 15px;
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>💰 股價手續費計算</h1>
        
        <div class="input-group">
            <label for="buyPrice">1. 買進價格 (元)</label>
            <input type="number" id="buyPrice" placeholder="輸入買價" inputmode="decimal">
        </div>

        <div class="input-group">
            <label for="sellPrice">2. 預計賣出 (可不填)</label>
            <input type="number" id="sellPrice" placeholder="輸入賣價" inputmode="decimal">
        </div>

        <button onclick="calculate()">開始計算</button>

        <div id="result" class="result-box">
            
            <div class="breakeven-box">
                損益平衡價 (不賠錢): <br>
                <span id="breakEven" class="highlight" style="color: #d63031;">0</span>
            </div>

            <div id="profitSection" class="profit-box" style="display:none;">
                預估淨賺/賠: <br>
                <span id="netProfit" class="highlight">0</span>
            </div>

        </div>
    </div>

    <script>
        function calculate() {
            var buyInput = document.getElementById('buyPrice').value;
            var sellInput = document.getElementById('sellPrice').value;
            
            if (buyInput === "") {
                return;
            }

            var buyPrice = parseFloat(buyInput);
            var sellPrice = parseFloat(sellInput);

            var feeRate = 0.001425; 
            var taxRate = 0.003;

            var stockValue = buyPrice * 1000;
            var buyFee = Math.round(stockValue * feeRate);
            var totalBuyCost = stockValue + buyFee;

            var breakEvenPrice = (stockValue + buyFee) / (1000 * (1 - feeRate - taxRate));
            document.getElementById('breakEven').innerText = breakEvenPrice.toFixed(2) + " 元";
            
            var profitSection = document.getElementById('profitSection');
            
            if (!isNaN(sellPrice)) {
                var sellStockValue = sellPrice * 1000;
                var sellFee = Math.round(sellStockValue * feeRate);
                var sellTax = Math.round(sellStockValue * taxRate);
                
                var sellNetIncome = sellStockValue - sellFee - sellTax;
                var netProfit = sellNetIncome - totalBuyCost;

                var profitSpan = document.getElementById('netProfit');
                profitSpan.innerText = netProfit.toLocaleString() + " 元";

                if (netProfit > 0) {
                    profitSpan.style.color = "#e1251b";
                    profitSection.style.backgroundColor = "#ff7675";
                    profitSection.style.color = "white"; 
                    profitSpan.style.color = "white";
                } else if (netProfit < 0) {
                    profitSpan.style.color = "#009432"; 
                    profitSection.style.backgroundColor = "#55efc4";
                    profitSection.style.color = "#2d3436";
                } else {
                    profitSpan.style.color = "#333";
                    profitSection.style.backgroundColor = "#dfe6e9";
                    profitSection.style.color = "#333";
                }

                profitSection.style.display = "block";
            } else {
                profitSection.style.display = "none";
            }

            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
